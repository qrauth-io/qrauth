version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: qrauth_postgres
    environment:
      POSTGRES_USER: qrauth
      POSTGRES_PASSWORD: qrauth_dev_password
      POSTGRES_DB: qrauth_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrauth -d qrauth_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qrauth_network

  redis:
    image: redis:7-alpine
    container_name: qrauth_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qrauth_network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: qrauth_clickhouse
    environment:
      CLICKHOUSE_DB: qrauth
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qrauth_network

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

networks:
  qrauth_network:
    driver: bridge
