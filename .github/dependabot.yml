version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      # Patch and minor updates are safe to group
      minor-and-patch:
        update-types:
          - minor
          - patch
    # Major versions get individual PRs so breaking changes are isolated
    ignore:
      # Prisma 7 requires full migration — handle manually
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10
