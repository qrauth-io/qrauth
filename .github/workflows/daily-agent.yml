name: Daily AI Analysis

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  analyze:
    name: Run AI Agent
    runs-on: ubuntu-latest
    steps:
      - name: Run agent on production server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: |
          # Set up SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | base64 -d > ~/.ssh/deploy_key 2>/dev/null || printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Run agent on server via SSH
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" bash -s "$ANTHROPIC_API_KEY" "$ADMIN_EMAIL" << 'REMOTE_SCRIPT'
            set -e
            cd ~/vqr

            # Source production env vars
            set -a
            source packages/api/.env
            set +a

            # Override with agent-specific vars
            export ANTHROPIC_API_KEY="$1"
            export ADMIN_EMAIL="$2"

            npx tsx packages/api/src/agent/daily-analysis.ts
          REMOTE_SCRIPT
        timeout-minutes: 10
