name: Daily AI Analysis

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  analyze:
    name: Run AI Agent
    runs-on: ubuntu-latest
    steps:
      - name: Run agent on production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          envs: ANTHROPIC_API_KEY,ADMIN_EMAIL
          script: |
            cd ~/vqr

            # Pull latest code
            git pull origin main

            # Install deps if needed
            npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

            # Build shared + generate Prisma client
            npm run build --workspace=packages/shared
            cd packages/api
            npx prisma generate

            # Run agent with DB access via Docker network
            DATABASE_URL="postgresql://vqr:$(grep POSTGRES_PASSWORD ~/vqr/deploy/.env | head -1 | cut -d= -f2)@localhost:5433/vqr" \
            REDIS_URL="redis://localhost:6382" \
            JWT_SECRET="agent-run-does-not-need-jwt-but-config-requires-32chars" \
            ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            ADMIN_EMAIL="${ADMIN_EMAIL}" \
            npx tsx src/agent/daily-analysis.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
