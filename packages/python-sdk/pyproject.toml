[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "qrauth"
version = "0.3.0"
description = "Official Python SDK for QRAuth — cryptographic QR code verification"
readme = "README.md"
license = "MIT"
authors = [
  { name = "Gernard Cerma", email = "aris@progressnet.gr" },
]
requires-python = ">=3.9"
dependencies = ["httpx>=0.27"]
keywords = ["qrauth", "qr-code", "verification", "authentication", "ecdsa"]

[project.urls]
Homepage = "https://qrauth.io"
Documentation = "https://qrauth.io/docs"
Repository = "https://github.com/qrauth-io/qrauth-python"
Issues = "https://github.com/qrauth-io/qrauth-python/issues"

[tool.hatch.build.targets.sdist]
# Explicit include list keeps the sdist tight and prevents hatchling from
# walking up the directory tree and bundling the monorepo's root
# .gitignore (which lists internal paths). Only ship the package source,
# the published README, and the license.
include = [
  "qrauth/**",
  "README.md",
]
exclude = [
  "tests/",
  ".gitignore",
]

[tool.hatch.build.targets.wheel]
packages = ["qrauth"]

[tool.pytest.ini_options]
# Pin the test discovery layout so CI doesn't depend on pytest auto-detection.
# Cross-language vector tests live in tests/test_canonical_vectors.py and
# read their fixtures from packages/protocol-tests/fixtures/canonical-vectors.json
# (relative to the repo root). The unit suite lives in tests/test_canonical_unit.py.
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-ra"
