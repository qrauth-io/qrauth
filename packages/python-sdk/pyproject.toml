[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "qrauth"
version = "0.1.0"
description = "Official Python SDK for QRAuth — cryptographic QR code verification"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
dependencies = ["httpx>=0.27"]
keywords = ["qrauth", "qr-code", "verification", "authentication", "ecdsa"]

[project.urls]
Homepage = "https://qrauth.io"
Documentation = "https://qrauth.io/docs"
Repository = "https://github.com/qrauth/qrauth-python"
